<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Registro Adoptante - AmigosPeludos</title>
    <meta charset="UTF-8">

</head>
<body>
<h1>Crear cuenta de Adoptante</h1>

<div th:if="${error}" style="color: red;">
    <p th:text="${error}"></p>
</div>

<form th:action="@{/registro/adoptante}" method="post">
    <h3>Datos de Acceso</h3>
    <input type="email" name="email" placeholder="Email"
           th:value="${cuenta != null ? cuenta.email : ''}" required>
    <input type="password" name="contrasena" placeholder="Contraseña" required>

    <h3>Datos Personales</h3>
    <input type="text" name="nombre" placeholder="Tu Nombre"
           th:value="${adoptante != null ? adoptante.nombre : ''}" required>

    <input type="text" name="apellidos" placeholder="Apellido (Opcional)"
           th:value="${adoptante != null ? adoptante.apellidos : ''}">

    <input type="text" name="provincia" placeholder="Provincia (Opcional)"
           th:value="${adoptante != null ? adoptante.provincia: ''}">
    <button type="submit">Registrarme</button>
</form>
<p>¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión aquí</a></p>
</body>
</html>
