<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Animal - GeoAdopt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .form-section-title {
            background-color: #f8f9fa;
            padding: 10px 15px;
            border-left: 5px solid #0d6efd;
            margin-bottom: 20px;
            font-weight: bold;
            color: #495057;
        }
        .card { border-radius: 15px; overflow: hidden; }
    </style>
</head>
<body class="bg-light">

<!-- Fragmento del Navbar -->
<div th:replace="~{fragments/navbar :: menu_principal}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-dark text-white py-3">
                    <h3 class="mb-0 fs-4"><i class="bi bi-paw-fill me-2"></i>Registrar Nuevo Animal</h3>
                </div>

                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/protectora/animales/guardar}" th:object="${animal}" method="post">

                        <!-- SECCIÓN 1: DATOS IDENTIFICATIVOS -->
                        <div th:if="${errorGlobal}" class="alert alert-danger" th:text="${errorGlobal}"></div>
                        <div class="form-section-title text-uppercase small">Datos Identificativos</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nombre del animal</label>
                                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Luna"
                                       required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Especie</label>
                                <select th:field="*{especie}" class="form-select" required>
                                    <option value="" selected disabled>Selecciona...</option>
                                    <option th:each="esp : ${especies}" th:value="${esp}" th:text="${esp}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Raza</label>
                                <input type="text" th:field="*{raza}" class="form-control" placeholder="Ej: Mestizo"
                                       required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Sexo</label>
                                <select th:field="*{sexo}" class="form-select" required>
                                    <option value="" selected disabled>Selecciona...</option>
                                    <option th:each="s : ${sexos}" th:value="${s}" th:text="${s}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Tamaño</label>
                                <select th:field="*{tamano}" class="form-select" required>
                                    <option value="" selected disabled>Selecciona...</option>
                                    <option value="Pequeño">Pequeño</option>
                                    <option value="Mediano">Mediano</option>
                                    <option value="Grande">Grande</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Peso (Kg)</label>
                                <input type="number" step="0.01" th:field="*{peso}" class="form-control"
                                       placeholder="0.00" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Fecha Nacimiento</label>
                                <input type="date" th:field="*{fechaNacimiento}" class="form-control" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Fecha Ingreso</label>
                                <input type="date" th:field="*{fechaIngreso}" class="form-control" required>
                            </div>
                        </div>

                        <!-- SECCIÓN 2: ESTADO Y SALUD -->
                        <div class="form-section-title text-uppercase small">Estado y Salud</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Estado actual en el centro</label>
                                <select th:field="*{estado}" class="form-select" required>
                                    <option th:each="est : ${estados}" th:value="${est}" th:text="${est}"></option>
                                </select>
                            </div>
                            <div class="col-md-8 d-flex align-items-center flex-wrap gap-4 pt-4">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" th:field="*{vacunado}">
                                    <label class="form-check-label">Vacunado</label>
                                </div>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" th:field="*{esterilizado}">
                                    <label class="form-check-label">Esterilizado</label>
                                </div>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" th:field="*{desparasitado}">
                                    <label class="form-check-label">Desparasitado</label>
                                </div>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" th:field="*{microchip}">
                                    <label class="form-check-label">Microchip</label>
                                </div>
                            </div>
                        </div>

                        <!-- SECCIÓN 3: COMPORTAMIENTO -->
                        <div class="form-section-title text-uppercase small">Comportamiento y Convivencia</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Nivel de actividad</label>
                                <select th:field="*{nivelActividad}" class="form-select" required>
                                    <option value="Bajo">Bajo</option>
                                    <option value="Medio" selected>Medio</option>
                                    <option value="Alto">Alto</option>
                                </select>
                            </div>
                            <div class="col-md-8 d-flex align-items-center flex-wrap gap-4 pt-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" th:field="*{aptoPerros}">
                                    <label class="form-check-label text-muted">Apto con perros</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" th:field="*{aptoGatos}">
                                    <label class="form-check-label text-muted">Apto con gatos</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" th:field="*{aptoNinos}">
                                    <label class="form-check-label text-muted">Apto con niños</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Necesidades Especiales</label>
                                <textarea th:field="*{necesidadesEspeciales}" class="form-control" rows="2"
                                          placeholder="Detalles sobre medicación, dieta especial..."></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Miedos conocidos</label>
                                <input type="text" th:field="*{miedos}" class="form-control"
                                       placeholder="Ej: Ruidos fuertes, tráfico, hombres...">
                            </div>
                        </div>

                        <!-- SECCIÓN 4: INFORMACIÓN ADICIONAL -->
                        <div class="form-section-title text-uppercase small">Información Pública y Fotos</div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">URL de la Foto Principal</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-image"></i></span>
                                <input type="url" th:field="*{fotoPrincipal}" class="form-control"
                                       placeholder="https://ejemplo.com/foto.jpg" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Descripción / Historia</label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="5"
                                      placeholder="Escribe aquí la descripción que verán los adoptantes..."
                                      required></textarea>
                        </div>

                        <hr class="my-5">

                        <div class="d-flex justify-content-between align-items-center">
                            <a th:href="@{/protectora/panel}" class="btn btn-outline-secondary px-4">
                                <i class="bi bi-arrow-left me-2"></i>Volver al panel
                            </a>
                            <button type="submit" class="btn btn-primary px-5 py-2 fw-bold shadow-sm">
                                <i class="bi bi-check-circle me-2"></i>Guardar Animal
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
