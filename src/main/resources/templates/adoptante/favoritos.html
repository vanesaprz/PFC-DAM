<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Favoritos - PatitasGal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .animal-card { transition: transform 0.2s; }
        .animal-card:hover { transform: scale(1.02); }
        .img-container { height: 200px; overflow: hidden; }
        .img-container img { object-fit: cover; height: 100%; width: 100%; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: menu_principal}"></div>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-uppercase"><i class="bi bi-heart-fill text-danger me-2"></i>Mis Favoritos</h2>
    </div>

    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${!favoritos.isEmpty()}" class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="favorito : ${favoritos}">
            <div class="card h-100 shadow-sm animal-card">
                <div class="img-container">
                    <img th:src="${favorito.animal.fotoPrincipal}"
                         class="card-img-top" th:alt="${favorito.animal.nombre}">
                </div>
                <div class="card-body">
                    <h5 class="card-title text-primary" th:text="${favorito.animal.nombre}">Nombre</h5>
                    <p class="card-text mb-1">
                        <strong>Raza:</strong> <span th:text="${favorito.animal.raza}"></span>
                    </p>
                    <p class="card-text mb-1">
                        <strong>Edad:</strong> <span th:text="${favorito.animal.getEdadFormateada()}"></span>
                    </p>
                    <p class="card-text mb-1">
                        <strong>Provincia:</strong> <span th:text="${favorito.animal.protectora.provincia}"></span>
                    </p>
                    <span class="badge"
                          th:text="${favorito.animal.estado}"
                          th:classappend="${favorito.animal.estado.name() == 'URGENTE'} ? 'bg-danger' : 'bg-success'">
                    </span>
                </div>
                <div class="card-footer bg-white border-top-0 pb-3 d-flex gap-2">
                    <a th:href="@{/animales/{id}(id=${favorito.animal.id})}"
                       class="btn btn-outline-primary w-100">
                        <i class="bi bi-eye me-1"></i>Ver ficha
                    </a>
                    <form th:action="@{/adoptante/favoritos/eliminar/{animalId}(animalId=${favorito.animal.id})}"
                          method="post">
                        <button type="submit" class="btn btn-outline-danger"
                                onclick="return confirm('¿Quitar de favoritos?')">
                            <i class="bi bi-heart-fill"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${favoritos.isEmpty()}" class="text-center py-5">
        <i class="bi bi-heart fs-1 text-muted d-block mb-3"></i>
        <h4 class="text-muted">Aún no tienes animales favoritos</h4>
        <p class="text-muted">Explora los animales disponibles y guarda los que más te gusten.</p>
        <a th:href="@{/animales}" class="btn btn-primary mt-2">
            <i class="bi bi-search me-2"></i>Buscar animales
        </a>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
