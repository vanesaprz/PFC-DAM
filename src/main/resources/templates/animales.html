<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Amigos - PatitasGal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .animal-card { transition: transform 0.2s; }
        .animal-card:hover { transform: scale(1.02); }
        .img-container { height: 200px; overflow: hidden; }
        .img-container img { object-fit: cover; height: 100%; width: 100%; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: menu_principal}"></div>

<div class="container py-5">
    <h1 class="text-center mb-5">Encuentra a tu nuevo compañero</h1>

    <div class="card shadow-sm mb-5">
        <div class="card-body">
            <form th:action="@{/animales}" method="get" class="row g-3">

                <div class="col-md-3">
                    <label class="form-label fw-bold">Especie</label>
                    <select name="especie" class="form-select">
                        <option value="">Todas</option>
                        <option th:each="esp : ${especies}"
                                th:value="${esp}"
                                th:text="${esp.label}"
                                th:selected="${esp.name() == especieSeleccionada}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-bold">Provincia</label>
                    <select name="provincia" class="form-select">
                        <option value="">Toda Galicia</option>
                        <option value="A Coruña" th:selected="${'A Coruña' == provinciaSeleccionada}">A Coruña</option>
                        <option value="Lugo" th:selected="${'Lugo' == provinciaSeleccionada}">Lugo</option>
                        <option value="Ourense" th:selected="${'Ourense' == provinciaSeleccionada}">Ourense</option>
                        <option value="Pontevedra" th:selected="${'Pontevedra' == provinciaSeleccionada}">Pontevedra
                        </option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label fw-bold">Tamaño</label>
                    <select name="tamano" class="form-select">
                        <option value="">Todos</option>
                        <option th:each="tam : ${tamanos}"
                                th:value="${tam}"
                                th:text="${tam.label}"
                                th:selected="${tam.name() == tamanoSeleccionado}">
                        </option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label fw-bold">Edad</label>
                    <select name="edad" class="form-select">
                        <option value="">Cualquiera</option>
                        <option value="Cachorro" th:selected="${'Cachorro' == edadSeleccionada}">Cachorro</option>
                        <option value="Joven" th:selected="${'Joven' == edadSeleccionada}">Joven</option>
                        <option value="Adulto" th:selected="${'Adulto' == edadSeleccionada}">Adulto</option>
                        <option value="Senior" th:selected="${'Senior' == edadSeleccionada}">Senior</option>
                    </select>
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100 py-2">Buscar</button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${!animales.isEmpty()}" class="row row-cols-1 row-cols-md-3 g-4">

        <div class="col" th:each="animal : ${animales}">
            <div class="card h-100 shadow-sm animal-card">
                <div class="img-container">
                    <img th:src="${animal.fotoPrincipal != null ? animal.fotoPrincipal : 'https://via.placeholder.com/400x300?text=Sin+Foto'}"
                         class="card-img-top" th:alt="${animal.nombre}">
                </div>
                <span th:if="${animal.estado.name() == 'URGENTE'}"
                      class="badge bg-danger position-absolute top-0 start-0 m-2">
                        🆘 URGENTE
                </span>
                <div class="card-body">
                    <h5 class="card-title text-primary" th:text="${animal.nombre}">Nombre</h5>
                    <p class="card-text mb-1">
                        <strong>Provincia:</strong> <span th:text="${animal.protectora.provincia}">Provincia</span>
                    </p>
                    <p class="card-text mb-1">
                        <strong>Tamaño:</strong> <span th:text="${animal.tamano.label}">Mediano</span>
                    </p>
                    <p class="card-text small text-muted" th:text="${animal.raza}">Raza</p>
                </div>
                <div class="card-footer bg-white border-top-0 pb-3">
                    <a th:href="@{/animales/{id}(id=${animal.id})}" class="btn btn-outline-primary w-100">Ver ficha
                        completa</a>
                </div>
            </div>
        </div>

    </div>

    <div th:if="${animales.isEmpty()}" class="text-center py-5">
        <h3 class="text-muted">No hemos encontrado peludos con esos filtros... </h3>
        <p>Prueba a cambiar los parámetros de búsqueda.</p>
        <a th:href="@{/animales}" class="btn btn-link">Ver todos los animales</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
