<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - PatitasGal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .foto-perfil { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 4px solid white; }
        .form-section-title { background-color: #f8f9fa; padding: 10px 15px; border-left: 5px solid #0d6efd; margin-bottom: 20px; font-weight: bold; color: #495057; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: menu_principal}"></div>

<main class="container py-5">

    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- COLUMNA IZQUIERDA: FOTO Y EMAIL -->
        <div class="col-md-3 text-center">
            <div class="card border-0 shadow-sm p-4">
                <div th:if="${adoptanteDTO.fotoPerfil != null and !adoptanteDTO.fotoPerfil.isEmpty()}">
                    <img th:src="${adoptanteDTO.fotoPerfil}"
                         class="foto-perfil mx-auto d-block mb-3 shadow-sm" alt="Foto de perfil">
                </div>
                <div th:if="${adoptanteDTO.fotoPerfil == null or adoptanteDTO.fotoPerfil.isEmpty()}"
                     class="foto-perfil mx-auto d-block mb-3 shadow-sm bg-light d-flex align-items-center justify-content-center">
                    <i class="bi bi-person-circle" style="font-size: 5rem; color: #adb5bd;"></i>
                </div>
                <h5 class="fw-bold mb-0"
                    th:text="${adoptanteDTO.nombre + ' ' + (adoptanteDTO.apellidos != null ? adoptanteDTO.apellidos : '')}"></h5>
                <small class="text-muted" th:text="${cuenta.email}"></small>
                <hr>
                <small class="text-muted">
                    <i class="bi bi-geo-alt me-1"></i>
                    <span th:text="${adoptanteDTO.provincia != null and !adoptanteDTO.provincia.isEmpty() ? adoptanteDTO.provincia : 'Provincia no especificada'}"></span>
                </small>
            </div>
        </div>

        <!-- COLUMNA DERECHA: FORMULARIO -->
        <div class="col-md-9">
            <div class="card border-0 shadow-sm p-4">
                <form th:action="@{/adoptante/perfil/guardar}" th:object="${adoptanteDTO}" method="post">

                    <div class="form-section-title text-uppercase small">Información Personal</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Apellidos</label>
                            <input type="text" th:field="*{apellidos}" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Provincia</label>
                            <select th:field="*{provincia}" class="form-select">
                                <option value="">Selecciona tu provincia</option>
                                <option value="A Coruña">A Coruña</option>
                                <option value="Lugo">Lugo</option>
                                <option value="Ourense">Ourense</option>
                                <option value="Pontevedra">Pontevedra</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">URL Foto de Perfil</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-image"></i></span>
                                <input type="url" th:field="*{fotoPerfil}" class="form-control"
                                       placeholder="https://ejemplo.com/foto.jpg">
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Preséntate</label>
                            <textarea th:field="*{presentacion}" class="form-control" rows="4"
                                      placeholder="Cuéntanos sobre ti, tu experiencia con animales..."></textarea>
                        </div>
                    </div>

                    <div class="form-section-title text-uppercase small">Datos de Acceso</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" th:value="${cuenta.email}" disabled>
                            <small class="text-muted">El email no puede modificarse.</small>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-3">
                        <a th:href="@{/}" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-arrow-left me-2"></i>Volver al inicio
                        </a>
                        <button type="submit" class="btn btn-primary px-5 fw-bold">
                            <i class="bi bi-save me-2"></i>Guardar cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
