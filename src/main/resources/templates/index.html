<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="UTF-8">
    <title>Adopta un Amigo - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:fragment="header-nav" style="background-color: #f8f9fa; padding: 1rem; border-bottom: 1px solid #dee2e6;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <strong>GeoAdopt</strong>

        <nav>
            <div sec:authorize="isAnonymous()">
                <a th:href="@{/}">Inicio</a> |
                <a th:href="@{/login}">Iniciar Sesión</a> |
                <a th:href="@{/registro/seleccion}">Registrarse</a>
            </div>

            <div sec:authorize="isAuthenticated()">
                <span>Bienvenido, <b sec:authentication="name">Usuario</b></span> |

                <form th:action="@{/logout}" method="post\" style="display: inline;">
                    <button type="submit"
                            style="background: none; border: none; color: blue; cursor: pointer; text-decoration: underline; padding: 0;">
                        Cerrar Sesión
                    </button>
                </form>
            </div>
        </nav>
    </div>
</header>
<div class="container animal-container">

    <div th:if="${!urgentes.isEmpty()}">
        <h2 class="section-title text-urgente">🆘 Casos muy urgentes</h2>
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">

            <div class="col" th:each="animal : ${urgentes}">
                <div class="card animal-card card-urgente h-100 shadow-sm">
                    <img th:src="${animal.fotoPrincipal}" class="card-img-top animal-card-img"
                         alt="Foto de ${animal.nombre}">
                    <div class="card-body">
                        <h5 class="card-title text-urgente" th:text="${animal.nombre}">Nombre</h5>
                        <p class="card-text mb-1">
                            <span class="badge bg-secondary" th:text="${animal.especie}"></span>
                            <span class="badge bg-light text-dark" th:text="${animal.raza}"></span>
                        </p>
                        <p class="small text-muted mb-0">
                            Ingresado: <span th:text="${#temporals.format(animal.fechaIngreso, 'dd/MM/yyyy')}"></span>
                        </p>
                    </div>
                </div>
            </div>

        </div>
        <hr class="my-5">
    </div>


    <div>
        <h2 class="section-title text-primary">🐾 Últimas llegadas</h2>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">

            <div class="col" th:each="animal : ${recientes}">
                <div class="card animal-card h-100 shadow-sm">
                    <img th:src="${animal.fotoPrincipal}" class="card-img-top animal-card-img"
                         alt="Foto de ${animal.nombre}">
                    <div class="card-body">
                        <h5 class="card-title text-primary" th:text="${animal.nombre}">Nombre</h5>
                        <p class="mb-1">
                            <i class="fas fa-paw"></i> <span
                                th:text="${animal.especie} + ' - ' + ${animal.raza}"></span>
                        </p>
                        <small class="text-muted">Tamaño: <span th:text="${animal.tamano}"></span></small>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
