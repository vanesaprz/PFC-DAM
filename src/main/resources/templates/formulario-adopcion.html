<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitud de Adopción - PatitasGal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .form-container { border: 1px solid #eee; padding: 30px; }
        .animal-resume { background-color: #f8f9fa; padding: 20px; border-radius: 12px; border-left: 5px solid #333; }
        .protectora-info { background-color: #e9ecef; padding: 15px; border-radius: 8px; font-size: 0.9rem; }
        .btn-adopt { background-color: #333; color: white; padding: 12px 30px; border: none; }
        .btn-adopt:hover { background-color: #000; color: white; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: menu_principal}"></div>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <h2 class="mb-4 fw-bold text-uppercase"><i class="bi bi-file-earmark-text me-2"></i>Formulario de Adopción
            </h2>

            <div class="row g-4">
                <!-- COLUMNA IZQUIERDA: RESUMEN ANIMAL Y PROTECTORA -->
                <div class="col-md-4">
                    <!-- Ficha Animal -->
                    <div class="animal-resume shadow-sm mb-4 text-center text-md-start">
                        <img th:src="${animal.fotoPrincipal != null ? animal.fotoPrincipal : '/img/default.jpg'}"
                             class="rounded-circle object-fit-cover mb-3 shadow-sm mx-auto d-block"
                             style="width: 120px; height: 120px; border: 4px solid white;">

                        <h4 class="fw-bold mb-1" th:text="${animal.nombre}">Nombre</h4>
                        <p class="text-muted small mb-3">
                            <span th:text="${animal.raza}">Raza</span><br>
                            <span th:text="${animal.getEdadFormateada()}">Edad</span>
                        </p>
                    </div>

                    <!-- Ficha Protectora -->
                    <div class="protectora-info shadow-sm">
                        <h6 class="fw-bold text-uppercase border-bottom pb-2 mb-3">Protectora responsable</h6>
                        <p class="mb-2"><i class="bi bi-house-heart me-2"></i><strong
                                th:text="${animal.protectora.nombre}">Nombre</strong></p>
                        <p class="mb-2"><i class="bi bi-geo-alt me-2"></i><span
                                th:text="${animal.protectora.provincia}">Provincia</span></p>
                        <p class="mb-0"><i class="bi bi-telephone me-2"></i><span
                                th:text="${animal.protectora.telefono}">Teléfono</span></p>
                        <hr>
                        <small class="text-muted italic">Al enviar este formulario, la protectora recibirá tus datos de
                            contacto para iniciar el proceso.</small>
                    </div>
                </div>

                <!-- COLUMNA DERECHA: FORMULARIO -->
                <div class="col-md-8">
                    <div class="form-container bg-white shadow-sm rounded p-4">
                        <form th:action="@{/solicitudes/guardar}"
                              th:object="${solicitudDTO}" method="post">
                            <input type="hidden" name="animalId" th:value="${animal.id}">

                            <div class="row g-3">
                                <h5 class="fw-bold mb-3 border-bottom pb-2">Información del Adoptante</h5>

                                <!-- Tipo de Vivienda -->
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small">Tipo de vivienda</label>
                                    <select class="form-select" th:field="*{tipoVivienda}" required>
                                        <option value="" selected disabled>Selecciona...</option>
                                        <option value="Piso">Piso</option>
                                        <option value="Casa con jardín">Casa con jardín</option>
                                        <option value="Finca/Campo">Finca o Campo</option>
                                    </select>
                                </div>

                                <!-- Otros Animales -->
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small">¿Convive con otros animales?</label>
                                    <select class="form-select" th:field="*{otrosAnimales}" required>
                                        <option value="" selected disabled>Selecciona...</option>
                                        <option value="No">No, ninguno</option>
                                        <option value="Sí, perros">Sí, perros</option>
                                        <option value="Sí, gatos">Sí, gatos</option>
                                        <option value="Sí, otros">Sí, otros</option>
                                    </select>
                                </div>

                                <!-- Mensaje General -->
                                <div class="col-12 mt-3">
                                    <label class="form-label fw-bold small">Cuéntanos por qué quieres adoptar a <span
                                            th:text="${animal.nombre}"></span></label>
                                    <textarea class="form-control" th:field="*{mensaje}" rows="6"
                                              placeholder="Describe tu experiencia con animales, tu estilo de vida..."
                                              required></textarea>
                                </div>

                                <div class="col-12 mt-4 d-flex justify-content-between align-items-center">
                                    <a th:href="@{/animales/{id}(id=${animal.id})}"
                                       class="text-muted text-decoration-none small">
                                        <i class="bi bi-arrow-left"></i> Cancelar y volver
                                    </a>
                                    <button type="submit" class="btn btn-dark btn-lg px-5 shadow">
                                        ENVIAR SOLICITUD <i class="bi bi-send ms-2"></i>
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
