<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Protectoras en Galicia - GeoAdopt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .protectora-card { transition: all 0.3s ease; border: 1px solid #eee; }
        .protectora-card:hover { transform: translateY(-5px); shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .logo-placeholder { width: 80px; height: 80px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: menu_principal}"></div>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">Protectoras Colaboradoras</h1>
        <p class="text-muted">Entidades que trabajan día a día por el bienestar animal en Galicia.</p>
    </div>

    <!-- Buscador de Protectoras (Opcional) -->
    <div class="row justify-content-center mb-5">
        <div class="col-md-6">
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Buscar por nombre o provincia...">
                <button class="btn btn-primary" type="button"><i class="bi bi-search"></i></button>
            </div>
        </div>
    </div>

    <!-- Listado en Grid -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

        <!-- Iteración de Protectoras -->
        <div class="col" th:each="pro : ${protectoras}">
            <div class="card h-100 shadow-sm protectora-card">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <div class="logo-placeholder me-3">
                            <i class="bi bi-house-heart fs-2 text-primary"></i>
                        </div>
                        <div>
                            <h5 class="card-title mb-0 fw-bold" th:text="${pro.nombre}">Nombre Protectora</h5>
                            <small class="text-muted"><i class="bi bi-geo-alt"></i> <span th:text="${pro.provincia}">Provincia</span></small>
                        </div>
                    </div>
                    <p class="card-text text-muted small mb-4" th:text="${#strings.abbreviate(pro.presentacion, 120)}">
                        Descripción corta de la protectora y su labor con los animales...
                    </p>
                    <div class="d-flex justify-content-between align-items-center mt-auto">
                        <span class="badge bg-light text-dark border"
                              th:with="total=${#lists.size(pro.animales)}"
                              th:text="|${total} ${total == 1 ? 'Animal' : 'Animales'}|">>
                            <i class="bi bi-paw-fill"></i> 12 Animales
                        </span>
                        <a th:href="@{/protectora/{id}(id=${pro.id})}" class="btn btn-outline-dark btn-sm">Ver
                            Perfil</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bloque de ejemplo si la lista está vacía -->
        <div th:if="${protectoras == null or protectoras.isEmpty()}" class="col-12 text-center py-5">
            <div class="alert alert-info">
                <i class="bi bi-info-circle me-2"></i> No hay protectoras registradas todavía.
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
