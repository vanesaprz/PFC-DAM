<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es">
<head>
    <meta charset="UTF-8">
    <title>Adopta un Amigo - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: menu_principal}"></div>
<div class="container animal-container">

    <div th:if="${!urgentes.isEmpty()}">
        <h2 class="section-title text-urgente">🆘 Casos muy urgentes</h2>
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">

            <div class="col" th:each="animal : ${urgentes}">
                <div class="card animal-card card-urgente h-100 shadow-sm">
                    <img th:src="${animal.fotoPrincipal}" class="card-img-top animal-card-img"
                         alt="Foto de ${animal.nombre}">
                    <div class="card-body">
                        <h5 class="card-title text-urgente" th:text="${animal.nombre}">Nombre</h5>
                        <p class="card-text mb-1">
                            <span class="badge bg-secondary" th:text="${animal.especie.label}"></span>
                            <span class="badge bg-light text-dark" th:text="${animal.getEdadFormateada()}"></span>
                        </p>
                        <p class="card-text mb-1">
                            <i class="bi bi-geo-alt"></i> <span th:text="${animal.protectora.provincia}"></span>
                        </p>
                        <p class="small text-muted mb-0">
                            Con nosotros desde: <span
                                th:text="${#temporals.format(animal.fechaIngreso, 'dd/MM/yyyy')}"></span>
                        </p>

                    </div>
                    <div class="card-footer bg-white border-top-0 pb-3">
                        <a th:href="@{/animales/{id}(id=${animal.id})}" class="btn btn-outline-primary w-100">Ver ficha
                            completa</a>
                    </div>
                </div>
            </div>

        </div>
        <hr class="my-5">
    </div>


    <div>
        <h2 class="section-title text-primary">🐾 Últimas llegadas</h2>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">

            <div class="col" th:each="animal : ${recientes}">
                <div class="card animal-card h-100 shadow-sm">
                    <img th:src="${animal.fotoPrincipal}" class="card-img-top animal-card-img"
                         alt="Foto de ${animal.nombre}">
                    <div class="card-body">
                        <h5 class="card-title text-primary" th:text="${animal.nombre}">Nombre</h5>
                        <p class="mb-1">
                            <i class="fas fa-paw"></i> <span
                                th:text="${animal.especie.label} + ' - ' + ${animal.getEdadFormateada()}"></span>
                        </p>
                        <p class="card-text mb-1">
                            <i class="bi bi-geo-alt"></i> <span th:text="${animal.protectora.provincia}"></span>
                        </p>
                        <small class="text-muted">Tamaño: <span th:text="${animal.tamano.label}"></span></small>
                    </div>
                    <div class="card-footer bg-white border-top-0 pb-3">
                        <a th:href="@{/animales/{id}(id=${animal.id})}" class="btn btn-outline-primary w-100">Ver ficha
                            completa</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
