<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Adoptante - PatitasGal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .container-form { max-width: 550px; margin: 50px auto; }

    </style>
</head>
<body class="bg-light">

<div class="container container-form">
    <div class="card shadow">
        <div class="card-header bg-primary text-white text-center py-3">
            <h2 class="mb-0">Crear cuenta de Adoptante</h2>
        </div>
        <div class="card-body p-4">

            <div th:if="${error}" class="alert alert-danger" role="alert">
                <span th:text="${error}">Error al registrar</span>
            </div>

            <form th:action="@{/registro/adoptante}" th:object="${datosAdoptante}" method="post">

                <h5 class="border-bottom pb-2 mb-3">Datos de Acceso</h5>

                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" th:field="*{email}" class="form-control"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                           placeholder="ejemplo@correo.com" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" th:field="*{password}" class="form-control"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" required>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                             th:errors="*{password}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Confirmar Contraseña</label>
                        <input type="password" th:field="*{repetirPassword}" class="form-control" required>
                    </div>
                </div>

                <h5 class="border-bottom pb-2 mb-3 mt-4">Información Personal</h5>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control"
                               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''" required>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}"
                             th:errors="*{nombre}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Apellidos</label>
                        <input type="text" th:field="*{apellidos}" class="form-control"
                               th:classappend="${#fields.hasErrors('apellidos')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('apellidos')}"
                             th:errors="*{apellidos}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Provincia</label>
                    <select th:field="*{provincia}" class="form-select">
                        <option value="">Selecciona tu provincia (opcional)</option>
                        <option value="A Coruña">A Coruña</option>
                        <option value="Lugo">Lugo</option>
                        <option value="Ourense">Ourense</option>
                        <option value="Pontevedra">Pontevedra</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">Cuéntanos sobre ti (Opcional)</label>
                    <textarea th:field="*{presentacion}" class="form-control" rows="3"
                              placeholder="¿Tienes experiencia con animales?"></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm">
                    Registrarme ahora
                </button>

                <div class="text-center mt-3">
                    <a th:href="@{/login}" class="text-decoration-none small">¿Ya tienes cuenta? Inicia sesión</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
