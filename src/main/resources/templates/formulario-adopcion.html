<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitud de Adopción</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container { border: 1px solid #ccc; padding: 30px; margin-top: 20px; }
        .animal-resume { background-color: #f8f9fa; padding: 15px; border-radius: 8px; }
        .btn-adopt { background-color: #333; color: white; padding: 12px 30px; border: none; }
        .btn-adopt:hover { background-color: #000; color: white; }
    </style>
</head>
<body>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4 fw-bold text-uppercase">Solicitud de Adopción</h2>

            <!-- Resumen del Animal -->
            <div class="animal-resume d-flex align-items-center mb-4">
                <!-- Verificamos que la foto exista -->
                <img th:src="${animal.fotoPrincipal != null ? animal.fotoPrincipal : '/img/default.jpg'}"
                     width="100" height="100"
                     class="rounded-circle object-fit-cover me-3 shadow-sm">
                <div>
                    <h4 class="mb-0" th:text="|Estás solicitando la adopción de ${animal.nombre}|">Nombre</h4>
                    <p class="text-muted mb-0">
                        <span th:text="${animal.especie}">Especie</span> -
                        <span th:text="${animal.getEdadFormateada()}">Edad</span>
                    </p>

                </div>
            </div>
            <div class="form-container shadow-sm p-4 border rounded">
                    <form th:action="@{/solicitudes/guardar}" th:object="${solicitud}" method="post">
                        <input type="hidden" name="animalId" th:value="${animal.id}">

                        <div class="row g-3">

                            <!-- Tipo de Vivienda -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Tipo de vivienda</label>
                                <select class="form-select" th:field="*{tipoVivienda}" required>
                                    <option value="" selected disabled>Selecciona una opción...</option>
                                    <option value="Piso">Piso</option>
                                    <option value="Casa con jardín">Casa con jardín</option>
                                    <option value="Finca/Campo">Finca o Campo</option>
                                </select>
                            </div>

                            <!-- Otros Animales -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold">¿Tienes otros animales?</label>
                                <select class="form-select" th:field="*{otrosAnimales}" required>
                                    <option value="" selected disabled>Selecciona una opción...</option>
                                    <option value="No">No, no tengo</option>
                                    <option value="Sí, perros">Sí, tengo perros</option>
                                    <option value="Sí, gatos">Sí, tengo gatos</option>
                                    <option value="Sí, otros">Sí, otros animales</option>
                                </select>
                            </div>

                            <!-- Mensaje General -->
                            <div class="col-12 mt-3">
                                <label class="form-label fw-bold">Mensaje adicional</label>
                                <textarea class="form-control" th:field="*{mensaje}" rows="5"
                                          placeholder="¿Por qué motivo quiere adoptar a este animal?"
                                          required></textarea>
                            </div>

                            <div class="col-12 mt-4 text-end">
                                <a th:href="@{/animales/{id}(id=${animal.id})}" class="btn btn-outline-secondary me-2">Cancelar</a>
                                <button type="submit" class="btn btn-dark px-4">ENVIAR SOLICITUD</button>
                            </div>
                        </div>
                    </form>
            </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
