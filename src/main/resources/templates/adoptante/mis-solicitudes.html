<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Solicitudes - GeoAdopt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: menu_principal}"></div>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-uppercase">Mis Solicitudes de Adopción</h2>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4">Animal</th>
                    <th>Protectora</th>
                    <th>Fecha Solicitud</th>
                    <th>Estado</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td class="ps-4">
                        <div class="d-flex align-items-center">
                            <img src="https://via.placeholder.com/50" class="rounded-circle me-3" alt="Foto animal">
                            <span class="fw-bold">Nombre Animal</span>
                        </div>
                    </td>
                    <td>Nombre de la Protectora</td>
                    <td>01/05/2026</td>
                    <td>
                        <span class="badge bg-warning text-dark">Pendiente</span>
                    </td>
                    <td class="text-center">
                        <a href="#" class="btn btn-sm btn-outline-dark">Ver detalle</a>
                    </td>
                </tr>

                <!-- Mensaje si no hay solicitudes -->
                <tr th:if="${#lists.isEmpty(solicitudes)}">
                    <td colspan="5" class="text-center py-5 text-muted">
                        <p class="mb-0">Aún no has realizado ninguna solicitud de adopción.</p>
                        <a th:href="@{/animales}" class="btn btn-link text-primary">¡Busca a tu compañero ideal!</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
