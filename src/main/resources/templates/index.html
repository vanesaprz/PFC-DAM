<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - PatitasGal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/animales.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: menu_principal}"></div>
<!-- HERO -->
<section class="hero-section text-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <img th:src="@{/images/PatitasGal.jpg}" alt="PatitasGal" class="hero-logo mb-4">
                <h1 class="display-5 fw-bold text-dark mb-3">Encuentra a tu compañero perfecto en Galicia</h1>
                
                <div class="d-flex justify-content-center gap-3 flex-wrap">
                    <a th:href="@{/animales}" class="btn btn-primary btn-lg px-5">
                        <i class="bi bi-search me-2"></i>Ver animales
                    </a>
                    <a th:href="@{/protectoras}" class="btn btn-outline-primary btn-lg px-5">
                        <i class="bi bi-house-heart me-2"></i>Ver protectoras
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

<div class="container animal-container">

    <!-- URGENTES -->
    <div th:if="${!urgentes.isEmpty()}">
        <h2 class="section-title text-urgente">🆘 Casos muy urgentes</h2>
        <div class="carousel-wrapper">
            <div id="carruselUrgentes" class="carousel slide">
                <div class="carousel-inner">
                    <div th:each="animal, iter : ${urgentes}"
                         th:if="${iter.index % 4 == 0}"
                         th:classappend="${iter.index == 0} ? 'active'"
                         class="carousel-item">
                        <div class="row g-4">
                            <div th:each="i : ${#numbers.sequence(0, 3)}"
                                 th:if="${iter.index + i < urgentes.size()}"
                                 class="col-md-3">
                                <div th:with="animal=${urgentes[iter.index + i]}">
                                    <div th:replace="~{fragments/fragmentos-animal :: tarjeta-animal(${animal}, false, 'btn-outline-danger', 'border-danger border-2')}"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <button class="carousel-control-prev" type="button"
                        data-bs-target="#carruselUrgentes" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon bg-dark rounded-circle p-2"></span>
                </button>
                <button class="carousel-control-next" type="button"
                        data-bs-target="#carruselUrgentes" data-bs-slide="next">
                    <span class="carousel-control-next-icon bg-dark rounded-circle p-2"></span>
                </button>
            </div>
        </div>
        <hr class="my-5">
    </div>

    <!-- RECIENTES -->
    <div>
        <h2 class="section-title text-primary">🐾 Últimas llegadas</h2>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            <div class="col" th:each="animal : ${recientes}">
                <div th:replace="~{fragments/fragmentos-animal :: tarjeta-animal(${animal}, false, 'btn-outline-primary', '')}"></div>
            </div>
        </div>
    </div>

</div>
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
